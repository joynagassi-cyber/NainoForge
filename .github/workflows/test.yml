name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true
          cache_dependency_path: 'pnpm-lock.yaml'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # Security: fixed command, no user input
        run: pnpm install --frozen-lockfile

      - name: Clean incremental build state
        run: find packages -name 'tsconfig.tsbuildinfo' -delete

      - name: Build dependencies
        env:
          PNPM_WORKSPACE_CONCURRENCY: '1'
        run: pnpm -r run build

      - name: Typecheck
        run: pnpm run typecheck

  burn-in:
    name: Burn-in
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true
          cache_dependency_path: 'pnpm-lock.yaml'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:ci

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  notify:
    name: Notifications
    needs: [quality, burn-in]
    if: always() && (failure() || cancelled())
    steps:
      - name: Notify on failure
        run: echo "TODO: wire Slack/email notification"
