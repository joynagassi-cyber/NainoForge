name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          cache: true
          cache_dependency_path: 'pnpm-lock.yaml'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # Security: fixed command, no user input
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  # Burn-in scaffold: frontend stack expects burn-in to detect flakiness.
  # BLOCKED: no Playwright/Cypress runner installed in S1, so no iterative loop to execute yet.
  # Gate rationale:
  # - P0 pass rate = 100% on typecheck/build
  # - P1 pass rate = >= 95% once a Playwright/Cypress suite is wired
  # - CI fails on typecheck/build failure before burn-in can enter.
  # Uncomment/add burn-in job when an E2E runner is added (see bmad-testarch-ci workflow).

