<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UJ Side Panel — Empty state (mock)</title>
<style>
  :root {
    --nf-primary: #7C3AED;
    --nf-primary-dark: #6D28D9;
    --nf-primary-darkest: #5B21B6;
    --nf-surface-base: #0A0A0F;
    --nf-surface-1: #12101C;
    --nf-surface-2: #1A1726;
    --nf-surface-3: #201D2E;
    --nf-text-primary: #F0F2F5;
    --nf-text-muted: #A5A0B8;
    --nf-border-subtle: rgba(255,255,255,0.08);
    --nf-state-forged: #22C55E;
    --nf-radius-sm: 6px;
    --nf-radius-md: 10px;
    --nf-radius-lg: 14px;
    --nf-space-1: 4px;
    --nf-space-2: 8px;
    --nf-space-3: 12px;
    --nf-space-4: 16px;
    --nf-space-5: 20px;
    --nf-touch: 44px;
    --nf-card: 0 1px 3px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--nf-surface-base); color: var(--nf-text-primary); font: 14px/1.5 system-ui, sans-serif; }

  /* Side panel shell */
  .side-panel { width: 400px; height: 100vh; margin: 0 auto; background: var(--nf-surface-1); border-left: 1px solid var(--nf-border-subtle); display: flex; flex-direction: column; }

  /* Header per EXPERIENCE.md */
  .sp-header {
    height: 44px; flex-shrink: 0; background: var(--nf-surface-1); border-bottom: 1px solid var(--nf-border-subtle);
    display: flex; align-items: center; justify-content: space-between; padding: 0 var(--nf-space-4);
  }
  .sp-brand { display: flex; align-items: center; gap: var(--nf-space-2); }
  .sp-brand-icon { width: 20px; height: 20px; color: var(--nf-primary); }
  .sp-brand-name { font-size: 16px; font-weight: 600; color: var(--nf-text-primary); }
  .sp-tabs { display: flex; gap: var(--nf-space-4); }
  .sp-tab { font-size: 12px; font-weight: 500; color: var(--nf-text-muted); background: none; border: none; cursor: pointer; position: relative; }
  .sp-tab[aria-selected="true"] { color: var(--nf-primary); }
  .sp-tab[aria-selected="true"]::after { content:''; position: absolute; left: 0; right: 0; bottom: -10px; height: 2px; background: var(--nf-primary); border-radius: 1px; }
  .sp-header-right { display: flex; align-items: center; gap: var(--nf-space-3); }
  .sp-net-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--nf-state-forged); box-shadow: 0 0 0 2px var(--nf-surface-1); }
  .sp-settings-btn { background: none; border: none; color: var(--nf-text-muted); cursor: pointer; padding: 4px; border-radius: 6px; }

  /* Body */
  .sp-body { flex: 1; overflow: hidden; position: relative; }

  /* EmptyState per DESIGN.md */
  .empty-state {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: var(--nf-space-5); max-width: 260px; margin: 0 auto; text-align: center;
  }
  .empty-icon { width: 40px; height: 40px; color: var(--nf-text-muted); margin-bottom: var(--nf-space-3); }
  .empty-headline { font-size: 16px; font-weight: 600; color: var(--nf-text-muted); margin: 0 0 var(--nf-space-3); }
  .empty-body { font-size: 12px; color: var(--nf-text-muted); margin: 0 0 var(--nf-space-5); line-height: 1.5; }

  /* ForgeButton per DESIGN.md */
  .forge-button {
    width: 100%; height: var(--nf-touch); border-radius: var(--nf-radius-lg); border: none;
    background: var(--nf-primary); color: var(--nf-surface-base); font: 500 12px/1 system-ui, sans-serif;
    letter-spacing: 0.01em; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 16px; transition: background-color var(--nf-duration-fast) ease, transform 120ms ease;
  }
  .forge-button:hover { background: var(--nf-primary-dark); }
  .forge-button:active { background: var(--nf-primary-darkest); }
  .forge-button:disabled { background: var(--nf-surface-3); color: #5E5A6E; cursor: not-allowed; opacity: 0.85; }
  .forge-button:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--nf-primary), 0 0 0 4px var(--nf-surface-1); }
</style>
</head>
<body>

<div class="side-panel">
  <header class="sp-header" role="banner">
    <div class="sp-brand">
      <svg class="sp-brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2c0 3-4 6-4 10a4 4 0 0 0 8 0c0-4-4-7-4-10z"/></svg>
      <span class="sp-brand-name">NainoForge</span>
    </div>
    <nav class="sp-tabs" role="tablist" aria-label="Sections">
      <button class="sp-tab" role="tab" aria-selected="true">Home</button>
      <button class="sp-tab" role="tab" aria-selected="false">Review</button>
      <button class="sp-tab" role="tab" aria-selected="false">Cosmos</button>
    </nav>
    <div class="sp-header-right">
      <span class="sp-net-dot" title="Online" aria-label="Online"></span>
      <button class="sp-settings-btn" aria-label="Open Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <div class="sp-body">
    <div class="empty-state" role="status">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2c0 3-4 6-4 10a4 4 0 0 0 8 0c0-4-4-7-4-10z"/></svg>
      <p class="empty-headline">Aucune source pour l’instant</p>
      <p class="empty-body">Naviguez vers un article et cliquez sur Forger pour capturer votre première source.</p>
      <button class="forge-button" type="button">Forger</button>
    </div>
  </div>
</div>

</body>
</html>
